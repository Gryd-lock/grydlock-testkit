name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secret-check:
    name: Check for Stellar secret seeds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/check-secrets.mjs

  validate:
    needs: secret-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run validate

  validate-changelog:
    name: Changelog updated
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for fixture changes
        id: fixture-diff
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- destinations.json scores.json 'transactions/*.xdr')
          if [ -n "$CHANGED" ]; then
            echo "fixture_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "fixture_changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify [Unreleased] section is populated
        if: steps.fixture-diff.outputs.fixture_changed == 'true'
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "::error file=CHANGELOG.md::CHANGELOG.md is missing."
            exit 1
          fi
          UNRELEASED=$(awk '/^## \[Unreleased\]/{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md)
          CONTENT=$(echo "$UNRELEASED" | grep -v '^\s*$' | grep -v '^\s*<!--')
          if [ -z "$CONTENT" ]; then
            echo "::error file=CHANGELOG.md::This PR modifies fixture files but the [Unreleased] section of CHANGELOG.md is empty."
            exit 1
          fi
          echo "CHANGELOG.md [Unreleased] section is populated — check passed."
